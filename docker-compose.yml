version: "3.9"

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cars
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  seaweedfs:
    image: chrislusf/seaweedfs
    command: server -dir=/data -s3
    ports:
      - "8333:8333"
      - "8888:8888"
      - "9333:9333"

  crawler:
    build: .
    command: python crawler_worker.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      seaweedfs:
        condition: service_started

  images:
    build: .
    command: python image_worker.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seaweedfs:
        condition: service_started

  discovery:
    build: .
    command: python discovery_worker.py
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy